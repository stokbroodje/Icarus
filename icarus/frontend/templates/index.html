<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pizzaboer Planner Prototype</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin=""/>
  <style>
    :root {
      /* palette sampled from the POS board */
      --bg: #02111f;          /* deep navy */
      --panel: #06182a;       /* sidebar / header navy */
      --panel-2: #0e2438;      /* hover / raised navy */
      --border: #173049;
      --text: #eef2f6;
      --muted: #9fb0c2;
      --accent: #1f6fd6;      /* in-store / oven blue */
      --accent-2: #3d8bef;
      --danger: #ab0001;      /* POS red  (late) */
      --warn:   #fb9600;      /* POS orange (warming) */
      --ok:     #0a7a12;      /* POS green (fresh) */
      --cyan:   #1a8fa6;      /* on-route teal */
      --grey:   #858681;      /* timed / scheduled */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI",
            Roboto, Helvetica, Arial, sans-serif;
      display: grid;
      grid-template-columns: 380px 1fr;
      grid-template-rows: 56px 1fr;
      grid-template-areas:
        "header header"
        "sidebar map";
      height: 100vh;
      transition: grid-template-columns 0.2s ease;
    }
    body.hide-sidebar {
      grid-template-columns: 0px 1fr;
    }
    body.hide-sidebar aside {
      opacity: 0;
      border-right-color: transparent;
    }
    header {
      grid-area: header;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 16px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-logo { width: 30px; height: 30px; color: var(--text); display: flex; flex-shrink: 0; }
    .brand-logo svg { width: 100%; height: 100%; }
    .brand-text { display: flex; flex-direction: column; line-height: 1.05; }
    .brand-title { font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
    .brand-sub { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .stats { display: flex; gap: 14px; margin-left: auto; align-items: center; }
    .stat { color: var(--muted); font-size: 12px; }
    .stat strong { color: var(--text); font-weight: 600; }

    aside { grid-area: sidebar; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; transition: opacity 0.2s ease;}
    .empty { padding: 32px 16px; color: var(--muted); text-align: center; font-size: 13px; }

    /* ---- POS-style order card: the whole row is tinted by its status colour ---- */
    .order {
      position: relative;
      padding: 9px 12px 9px 14px;
      border-bottom: 2px solid var(--bg);
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-areas:
        "num addr  timer"
        "num meta  meta";
      column-gap: 12px;
      row-gap: 3px;
      align-items: center;
      cursor: pointer;
      color: #fff;                  /* default: white text on the colour bar */
      background: var(--grey);      /* fallback; set per-status inline in JS */
      transition: filter 0.1s;
    }
    .order:hover { filter: brightness(1.08); }
    .order.selected { box-shadow: inset 0 0 0 3px #fff, 0 1px 0 rgba(0,0,0,0.4); }

    /* orange bars get black text for contrast */
    .order.dark-text { color: #141414; }

    .order .nr {
      grid-area: num;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: 30px; line-height: 1;
      letter-spacing: -0.5px;
      align-self: center;
    }
    .order .timer {
      grid-area: timer;
      font-variant-numeric: tabular-nums;
      font-size: 13px; font-weight: 700;
      text-align: right; opacity: 0.92;
    }
    .order .addr {
      grid-area: addr;
      font-size: 13px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .order .actions { grid-area: meta; display: flex; gap: 6px; align-items: center; }
    .order .badge {
      font-size: 10px; padding: 2px 6px; border-radius: 3px;
      background: rgba(0,0,0,0.28); color: inherit;
      border: 1px solid rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 0.4px; font-weight: 700;
    }
    .order.dark-text .badge { background: rgba(255,255,255,0.4); border-color: rgba(0,0,0,0.3); }
    .order .badge.timed { background: var(--danger); color: #fff; border-color: transparent; }

    .order .del {
      margin-left: auto;
      background: rgba(0,0,0,0.25); color: inherit;
      border: 1px solid rgba(255,255,255,0.35); border-radius: 3px;
      padding: 2px 8px; cursor: pointer; font-size: 11px; font-weight: 600;
    }
    .order.dark-text .del { background: rgba(255,255,255,0.35); border-color: rgba(0,0,0,0.3); }
    .order .del:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    #map { grid-area: map; height: 100%; background: #e8e0d8; }
    .leaflet-container { background: #e8e0d8; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
    }
    .leaflet-popup-content { margin: 8px 12px; font-size: 12px; }
    .leaflet-popup-content b { color: var(--text); }
    /* ---- stream panel ---- */
    #map { position: relative; overflow: hidden; }
    #streamPanel {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 360px; max-width: 48vw;
      background: var(--panel); border-left: 1px solid var(--border);
      transform: translateX(100%); transition: transform 0.2s ease;
      z-index: 500; display: flex; flex-direction: column;
    }
    #streamPanel.open { transform: translateX(0); }
    #streamPanelHdr {
      background: transparent; border-bottom: 1px solid var(--border);
      padding: 8px 12px; font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    #streamPanelHdr strong { color: var(--text); }
    #streamImgWrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #0a0c10; overflow: hidden; position: relative;
    }
    #streamImg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-90deg);
      transform-origin: center center;
      max-width: none; max-height: none;
    }
    #streamToggle {
      position: absolute; top: 10px; right: 10px; z-index: 501;
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; cursor: pointer; font: inherit; font-size: 12px;
      display: flex; align-items: center; gap: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    #streamToggle:hover { background: var(--panel-2); }
    #streamToggle .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
    body:has(#streamPanel.open) #streamToggle { right: 370px; }
    #sidebarToggle {
      position: absolute; top: 10px; left: 10px; z-index: 501;
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; cursor: pointer; font: inherit; font-size: 12px;
      display: flex; align-items: center; gap: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    #sidebarToggle:hover { background: var(--panel-2); }
  </style>
</head>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
  (() => {
    "use strict";

    // Store location (matches router.py defaults)
    const STORE = [53.24657003069633, 6.587648954036653];

    const map = L.map("map", { zoomControl: true }).setView(STORE, 13);
    map.zoomControl.setPosition("bottomleft");   // clear the top-left for the floating Orders toggle
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    L.marker(STORE, {
      title: "Store",
      icon: L.divIcon({
        className: "store-marker",
        html: '<div style="width:14px;height:14px;border-radius:50%;background:#1f6fd6;border:2px solid #fff;box-shadow:0 0 0 2px #1f6fd644"></div>',
        iconSize: [18, 18], iconAnchor: [9, 9],
      }),
    }).addTo(map).bindPopup("<b>Store</b>");

    // --- State: number -> { data, marker?, route? } ---
    const orders = new Map();
    let selectedNr = null;

    // --- Helpers ---
    function fmtCountdown(secs) {
      if (secs <= 0) return "0:00";
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return m + ":" + String(s).padStart(2, "0");
    }
    function timerClass(secs) {
      if (secs <= 0) return "late";
      if (secs <= 60) return "warn";
      return "";
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      })[c]);
    }
    // --- Age colour: green fresh -> orange @3min -> red @6min; timed greyed out ---
    const AGE_COLORS = { green: "#0a7a12", orange: "#fb9600", red: "#ab0001", grey: "#858681" };
    function ageBucket(o, nowSec) {
      if (o.timed) return "grey";                 // scheduled: createdAt isn't a freshness signal
      const age = nowSec - (o.createdAt || nowSec);
      if (age >= 360) return "red";
      if (age >= 180) return "orange";
      return "green";
    }
    // --- Lifecycle pin/route colour: blue once it's in the store (oven/rack), cyan once out
    //     for delivery (onroute). live/preparing keep the age colour (green -> orange -> red). ---
    const STATUS_COLORS = { oven: "#1f6fd6", rack: "#1f6fd6", onroute: "#1a8fa6" };
    function markerColor(o, nowSec) {
      return STATUS_COLORS[o.status] ?? AGE_COLORS[ageBucket(o, nowSec)];
    }
    function routeStyle(color, selected) {
      return selected
        ? { color, weight: 5, opacity: 0.95 }
        : { color, weight: 3, opacity: 0.5 };
    }
    function destIcon(color, selected, nr) {
      const w = selected ? 32 : 27;            // pin width (px); height follows the viewBox ratio
      const h = Math.round(w * 34 / 24);       // teardrop is 24x34 in viewBox units
      const shadow = selected
        ? `drop-shadow(0 0 3px ${color}) drop-shadow(0 2px 3px rgba(0,0,0,0.45))`
        : `drop-shadow(0 2px 3px rgba(0,0,0,0.4))`;
      const html = `
        <svg width="${w}" height="${h}" viewBox="0 0 24 34"
             xmlns="http://www.w3.org/2000/svg" style="filter:${shadow};overflow:visible">
          <path d="M12 1 C5.9 1 1 5.9 1 12 c0 8.2 11 21 11 21 s11-12.8 11-21 C23 5.9 18.1 1 12 1 z"
                fill="${color}" stroke="#fff" stroke-width="${selected ? 2 : 1.6}"/>
          <text x="12" y="12.5" text-anchor="middle" dominant-baseline="central"
                font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif"
                font-size="11" font-weight="700" fill="#fff" letter-spacing="-0.5">${nr}</text>
        </svg>`;
      return L.divIcon({
        className: "dest-marker",
        html,
        iconSize: [w, h],
        iconAnchor: [w / 2, h],          // the tip sits exactly on the coordinate
        popupAnchor: [0, -h + 4],
      });
    }
    function cssEsc(s) { return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s); }
    // repaint a single sidebar row's colour in place (whole-row tint + black text on orange)
    function applyRowColor(nr, color) {
      const row = listEl.querySelector(`.order[data-nr="${cssEsc(nr)}"]`);
      if (!row) return;
      row.style.background = color;
      row.classList.toggle("dark-text", color === AGE_COLORS.orange);
    }

    // --- Map layers ---
    function addOrUpdateMapLayers(nr, d) {
      const entry = orders.get(nr);
      if (!entry) return;
      if (d.status === "finished") {          // finished -> drop off the board
        if (entry.marker) { entry.marker.remove(); entry.marker = null; }
        if (entry.route)  { entry.route.remove();  entry.route = null; }
        declutter();
        return;
      }
      const selected = nr === selectedNr;
      const nowSec = Date.now() / 1000;
      entry.bucket = ageBucket(d, nowSec);
      const color = markerColor(d, nowSec);
      entry.color = color;

      if (typeof d.lat === "number" && typeof d.lon === "number") {
        entry.trueLatLng = [d.lat, d.lon];          // declutter offsets from this; routes anchor here
        if (entry.marker) {
          entry.marker.setLatLng(entry.trueLatLng);
          entry.marker.setIcon(destIcon(color, selected, nr));
        } else {
          entry.marker = L.marker(entry.trueLatLng, { icon: destIcon(color, selected, nr) })
            .addTo(map)
            .bindPopup(`<b>#${escapeHtml(nr)}</b><br>${escapeHtml(d.address || "")}`)
            .on("click", () => selectOrder(nr));
        }
      }

      if (Array.isArray(d.route) && d.route.length) {
        if (entry.route) entry.route.remove();
        const layer = L.layerGroup();
        for (const seg of d.route) {
          try {
            const geo = typeof seg === "string" ? JSON.parse(seg) : seg;
            L.geoJSON(geo, { style: routeStyle(color, selected) }).addTo(layer);
          } catch (_) { /* skip bad segment */ }
        }
        layer.addTo(map);
        entry.route = layer;
      } else if (entry.route) {
        entry.route.eachLayer(l => l.setStyle && l.setStyle(routeStyle(color, selected)));
      }
      declutter();
    }
    function removeMapLayers(nr) {
      const entry = orders.get(nr);
      if (!entry) return;
      if (entry.marker) entry.marker.remove();
      if (entry.route) entry.route.remove();
      declutter();
    }
    function refreshLayerStyles() {
      const nowSec = Date.now() / 1000;
      for (const [nr, e] of orders) {
        e.bucket = ageBucket(e.data, nowSec);
        const color = markerColor(e.data, nowSec);    // status colour (blue/cyan) or age drift
        if (color !== e.color) {
          e.color = color;
          const sel = nr === selectedNr;
          if (e.marker) e.marker.setIcon(destIcon(color, sel, nr));
          if (e.route) e.route.eachLayer(l => l.setStyle && l.setStyle(routeStyle(color, sel)));
          applyRowColor(nr, color);
        }
      }
    }

    // --- Pin declutter: fan out markers that overlap at the current zoom, recomputed on
    //     zoom/move, always offsetting from each order's true coordinate so it stays stable. ---
    function declutter() {
      const pts = [];
      for (const [nr, e] of orders) {
        if (!e.marker || !e.trueLatLng) continue;
        pts.push({ nr, e, ll: e.trueLatLng, p: map.latLngToLayerPoint(e.trueLatLng) });
      }
      const R = 22;                                  // px: closer than this counts as overlapping
      const groups = [];
      for (const pt of pts) {
        const g = groups.find(grp => grp.some(o => o.p.distanceTo(pt.p) < R));
        if (g) g.push(pt); else groups.push([pt]);
      }
      for (const g of groups) {
        if (g.length === 1) { g[0].e.marker.setLatLng(g[0].ll); continue; }
        const cx = g.reduce((s, o) => s + o.p.x, 0) / g.length;
        const cy = g.reduce((s, o) => s + o.p.y, 0) / g.length;
        const ringR = R * (g.length > 6 ? 1.7 : 1.15);
        g.forEach((o, i) => {
          const ang = (2 * Math.PI * i) / g.length;
          const np = L.point(cx + ringR * Math.cos(ang), cy + ringR * Math.sin(ang));
          o.e.marker.setLatLng(map.layerPointToLatLng(np));
        });
      }
    }
    map.on("zoomend moveend", declutter);

    // --- Sidebar ---
    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");

    function renderList() {
      const nowSec = Date.now() / 1000;
      const entries = [...orders.values()].map(e => e.data)
        .filter(o => o.type !== "Carryout" && o.status !== "finished");
      countEl.textContent = entries.length;

      if (!entries.length) {
        listEl.innerHTML = '<div class="empty">No orders yet.</div>';
        return;
      }

      // timed first, then soonest countdown (none last), then number
      // group by lifecycle stage: live/preparing on top, then timed, then oven, rack, onroute; number asc within
      const STATUS_RANK = { live: 0, preparing: 0, oven: 2, rack: 3, onroute: 4, finished: 5 };
      const rankOf = o => o.timed ? 1 : (STATUS_RANK[o.status] ?? 0);
      entries.sort((a, b) => {
        const ra = rankOf(a), rb = rankOf(b);
        if (ra !== rb) return ra - rb;
        return Number(a.number) - Number(b.number);
      });

      const now = Date.now() / 1000;
      listEl.innerHTML = entries.map(o => {
        const sel = o.number === selectedNr ? " selected" : "";
        const rowColor = markerColor(o, nowSec);                 // blue=oven/rack, cyan=on-route, else age
        const darkText = rowColor === AGE_COLORS.orange ? " dark-text" : "";
        const hasTimer = typeof o.countdown === "number";
        const secs = hasTimer ? o.countdown - now : null;
        const timerHtml = hasTimer
          ? `<span class="timer ${timerClass(secs)}" data-countdown="${o.countdown}">${fmtCountdown(secs)}</span>`
          : '<span class="timer"></span>';
        const timedBadge = o.timed ? '<span class="badge timed">timed</span>' : "";
        return `
          <div class="order${sel}${darkText}" data-nr="${escapeHtml(o.number)}" style="background:${rowColor}">
            <span class="nr">${escapeHtml(o.number)}</span>
            ${timerHtml}
            <span class="addr">${escapeHtml(o.address || "—")}</span>
            <span class="actions">
              <span class="badge status">${escapeHtml(o.status)}</span>
              ${timedBadge}
              <button class="del" data-nr="${escapeHtml(o.number)}">delete</button>
            </span>
          </div>`;
      }).join("");
    }

    // tick: update countdowns in place + re-evaluate age colour as orders cross 3min / 6min
    setInterval(() => {
      const now = Date.now() / 1000;
      for (const el of listEl.querySelectorAll(".timer[data-countdown]")) {
        const secs = parseFloat(el.dataset.countdown) - now;
        el.textContent = fmtCountdown(secs);
        el.classList.remove("warn", "late");
        const cls = timerClass(secs);
        if (cls) el.classList.add(cls);
      }
      for (const [nr, e] of orders) {
        e.bucket = ageBucket(e.data, now);             // keep the age bucket current
        const color = markerColor(e.data, now);        // oven/rack=blue, on-route=cyan, else age colour
        if (color === e.color) continue;               // only repaint when the colour actually changes
        e.color = color;
        const sel = nr === selectedNr;
        if (e.marker) e.marker.setIcon(destIcon(color, sel, nr));
        if (e.route) e.route.eachLayer(l => l.setStyle && l.setStyle(routeStyle(color, sel)));
        applyRowColor(nr, color);
      }
    }, 1000);

    listEl.addEventListener("click", (e) => {
      const delBtn = e.target.closest(".del");
      if (delBtn) { e.stopPropagation(); deleteOrder(delBtn.dataset.nr); return; }
      const row = e.target.closest(".order");
      if (row) selectOrder(row.dataset.nr);
    });

    function selectOrder(nr) {
      selectedNr = selectedNr === nr ? null : nr;
      refreshLayerStyles();
      renderList();
      const entry = orders.get(nr);
      if (entry?.marker && selectedNr === nr) {
        map.panTo(entry.trueLatLng || entry.marker.getLatLng());
        entry.marker.openPopup();
      }
    }

    async function deleteOrder(nr) {
      try {
        await fetch(`/api/orders/${encodeURIComponent(nr)}`, { method: "DELETE" });
        applyDelete(nr);   // optimistic; the broadcast will confirm
      } catch (err) { console.error("delete failed", err); }
    }

    // --- Apply events ---
    function applyUpsert(d) {
      const nr = d.number;
      let entry = orders.get(nr);
      if (!entry) { entry = { data: { ...d } }; orders.set(nr, entry); }
      else        { entry.data = { ...entry.data, ...d }; }
      addOrUpdateMapLayers(nr, entry.data);
      renderList();
    }
    function applyDelete(nr) {
      if (!orders.has(nr)) return;
      removeMapLayers(nr);
      orders.delete(nr);
      if (selectedNr === nr) selectedNr = null;
      renderList();
    }
    function handleEvent(ev) {
      if (!ev || typeof ev !== "object") return;
      
      if (ev.event === "deleted") {
        applyDelete(ev.number);
      } else if (ev.event === "new_frame") {
        // Only fetch if the panel is actually open
        if (streamPanel.classList.contains("open")) {
          streamImg.src = "/latest.jpg?t=" + Date.now();
        }
      } else {
        applyUpsert(ev);          // full order record
      }
    }

    // --- SSE ---
    function connect() {
      const es = new EventSource("/events");

      es.addEventListener("snapshot", (e) => {
        try {
          const arr = JSON.parse(e.data);
          console.log("[snapshot]", arr);
          for (const nr of [...orders.keys()]) removeMapLayers(nr);
          orders.clear();
          for (const o of arr) {
            orders.set(o.number, { data: { ...o } });
            addOrUpdateMapLayers(o.number, o);
          }
          renderList();
        } catch (err) { console.error("bad snapshot", err); }
      });

      es.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          console.log("[event]", msg);    // every received update (server posts diffs only)
          handleEvent(msg);
        } catch (err) { console.error("bad event", err, e.data); }
      };

      es.onerror = () => { /* EventSource auto-reconnects */ };
    }
    // --- Stream panel ---
    const streamPanel  = document.getElementById("streamPanel");
    const streamToggle = document.getElementById("streamToggle");
    const streamImg    = document.getElementById("streamImg");
    const streamStatus = document.getElementById("streamStatus");
    const streamLbl    = document.getElementById("streamLbl");
    const streamWrap   = document.getElementById("streamImgWrap");

    function fitStream() {
      const nw = streamImg.naturalWidth, nh = streamImg.naturalHeight;
      if (!nw || !nh) return;
      const ww = streamWrap.clientWidth, wh = streamWrap.clientHeight;
      const s = Math.min(ww / nh, wh / nw);      // axes swapped because image is rotated 90°
      streamImg.style.width  = (nw * s) + "px";
      streamImg.style.height = (nh * s) + "px";
    }

    function setStream(open) {
      streamPanel.classList.toggle("open", open);
      streamLbl.textContent = open ? "Hide" : "Stream";
      
      if (open) {
        // Fetch the immediate frame right when they click open
        streamImg.src = "/latest.jpg?t=" + Date.now();
      } else {
        // Clear it out when closed
        streamImg.removeAttribute("src");
        streamStatus.textContent = "—";
      }
      
      setTimeout(() => { map.invalidateSize(); fitStream(); }, 220);
    }
    // --- Attach Listeners & Initialize ---
    streamToggle.addEventListener("click", () => setStream(!streamPanel.classList.contains("open")));
    streamImg.addEventListener("load",  () => { streamStatus.textContent = "live"; fitStream(); });
    streamImg.addEventListener("error", () => { streamStatus.textContent = "no signal"; });
    window.addEventListener("resize", fitStream);
    
    // --- Sidebar Toggle ---
    const sidebarToggle = document.getElementById("sidebarToggle");
    const sidebarLbl = document.getElementById("sidebarLbl");
    sidebarToggle.addEventListener("click", () => {
      const hidden = document.body.classList.toggle("hide-sidebar");
      sidebarLbl.textContent = hidden ? "Orders" : "Hide";

      // Wait for the CSS grid transition (0.2s) to finish before resizing the map.
      setTimeout(() => {
        map.invalidateSize();
      }, 220); 
    });

    // Start listening to the server
    connect();
  })();
  </script>
</body>
</html>
